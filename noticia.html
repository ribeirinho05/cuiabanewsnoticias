<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUIABÁ NEWS — Notícia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .noticia-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .noticia-header { margin-bottom: 24px; }
        .noticia-category {
            display: inline-block; background: var(--gold); color: var(--navy);
            padding: 4px 14px; border-radius: 6px; font-size: 0.7rem;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .noticia-title {
            font-family: var(--font-display); font-size: 2.2rem;
            font-weight: 800; line-height: 1.2; margin-bottom: 12px;
        }
        .noticia-meta { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; }
        .noticia-image {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            border-radius: var(--radius); margin-bottom: 28px;
        }
        .noticia-body { font-size: 1.1rem; line-height: 1.9; }
        .noticia-back {
            display: inline-flex; align-items: center; gap: 6px;
            margin-bottom: 20px; color: var(--gold); font-weight: 600;
            font-size: 0.9rem;
        }
        .noticia-back:hover { color: var(--orange); }
        .noticia-share-bar {
            display: flex; gap: 10px; margin-top: 32px; padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .noticia-share-btn {
            padding: 10px 20px; border-radius: 8px; font-weight: 600;
            font-size: 0.85rem; color: white; display: flex; align-items: center;
            gap: 6px;
        }
        .noticia-share-btn.whatsapp { background: #25D366; }
        .noticia-share-btn.twitter { background: #1DA1F2; }
        .noticia-share-btn.facebook { background: #1877F2; }
        @media (max-width: 768px) {
            .noticia-title { font-size: 1.5rem; }
            .noticia-body { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <div class="container">
                <a href="/" class="logo">
                    <span class="logo-cuiaba">CUIABÁ</span><span class="logo-news">NEWS</span>
                </a>
            </div>
        </div>
    </header>

    <main class="noticia-container">
        <a href="/" class="noticia-back">
            <span class="material-icons">arrow_back</span> Voltar ao início
        </a>
        <div id="noticia-content">
            <p style="text-align:center; padding:60px 0; color: var(--text-secondary);">Carregando notícia...</p>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 CUIABÁ NEWS. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="js/news-data.js"></script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var container = document.getElementById('noticia-content');
        if (!id || typeof noticias === 'undefined') {
            container.innerHTML = '<p style="text-align:center;padding:60px 0;">Notícia não encontrada.</p>';
            return;
        }
        var n = noticias.find(function(x) { return x.id == id; });
        if (!n) {
            container.innerHTML = '<p style="text-align:center;padding:60px 0;">Notícia não encontrada.</p>';
            return;
        }
        var cats = typeof CATEGORIAS !== 'undefined' ? CATEGORIAS : {};
        var catInfo = cats[n.categoria] || {nome: n.categoria};
        document.title = n.titulo + ' — CUIABÁ NEWS';

        container.innerHTML =
            '<div class="noticia-header">' +
                '<span class="noticia-category">' + (catInfo.nome || n.categoria) + '</span>' +
                '<h1 class="noticia-title">' + n.titulo + '</h1>' +
                '<div class="noticia-meta">' + n.autor + ' &bull; ' + n.tempo + '</div>' +
            '</div>' +
            '<img class="noticia-image" src="' + n.imagem + '" alt="">' +
            '<div class="noticia-body">' +
                '<p><strong>' + (n.resumo || '') + '</strong></p>' +
                '<p>A informação foi confirmada por fontes oficiais na manhã desta ' + ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'][new Date().getDay()] + '. Representantes locais destacaram a importância do tema para a população de Cuiabá e região metropolitana.</p>' +
                '<p>Segundo especialistas consultados pela reportagem do Cuiabá News, a medida pode trazer impactos significativos para o desenvolvimento econômico e social da capital mato-grossense nos próximos meses.</p>' +
                '<p>"Estamos trabalhando para garantir que todas as etapas sejam cumpridas dentro do cronograma estabelecido", afirmou uma das autoridades envolvidas no processo.</p>' +
                '<p>A equipe de reportagem continuará acompanhando o desdobramento do caso e trará novas informações assim que disponíveis. Acompanhe o Cuiabá News para ficar por dentro de tudo que acontece na capital e no estado de Mato Grosso.</p>' +
            '</div>' +
            '<div class="noticia-share-bar">' +
                '<a class="noticia-share-btn whatsapp" href="https://wa.me/?text=' + encodeURIComponent(n.titulo + ' - ' + window.location.href) + '" target="_blank"><span class="material-icons">chat</span> WhatsApp</a>' +
                '<a class="noticia-share-btn twitter" href="https://twitter.com/intent/tweet?text=' + encodeURIComponent(n.titulo) + '&url=' + encodeURIComponent(window.location.href) + '" target="_blank"><span class="material-icons">tag</span> Twitter</a>' +
                '<a class="noticia-share-btn facebook" href="https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href) + '" target="_blank"><span class="material-icons">thumb_up</span> Facebook</a>' +
            '</div>';

        var saved = localStorage.getItem('cuiabanews-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
    </script>
</body>
</html>
